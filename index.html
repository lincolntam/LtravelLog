<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LTravelLog - Precision Navigation</title>
    <!-- PWA & 圖示設定 -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <meta name="theme-color" content="#000000">
    
    <link rel="stylesheet" href="style.css?v=0.40.4">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') window.location.href = 'login.html';
        
        function logout() {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('userEmail');
            window.location.href = 'login.html';
        }
    </script>
</head>
<body>

    <div class="app-banner">
        <div class="banner-overlay">
            <h1>LTravelLog</h1>
            <p>Hong Kong Trip Budgeting & Navigation</p>
        </div>
        <button class="logout-btn-top" onclick="logout()">
            <span class="material-icons">logout</span>
        </button>
    </div>

    <div class="app-container">
        <section class="card">
            <div class="card-header">
                <span class="material-icons" style="font-size:14px; color:var(--primary)">place</span>
                <label>行程節點 (Nodes)</label>
            </div>
            <div id="nodes-container">
                <div class="input-wrapper"><input class="node-input" placeholder="由哪裡出發？" oninput="calculate()"></div>
                <div class="input-wrapper"><input class="node-input" placeholder="目的地在哪？" oninput="calculate()"></div>
            </div>
            <div class="action-row">
                <button class="secondary-btn" onclick="addNode()"><span class="material-icons" style="font-size:16px;">add</span> 中途站</button>
                <button class="secondary-btn" id="retBtn" onclick="toggleReturn()"><span class="material-icons" style="font-size:16px;">repeat</span> 往返模式</button>
            </div>
        </section>

        <section class="card">
            <div class="card-header">
                <span class="material-icons" style="font-size:14px; color:var(--primary)">settings</span>
                <label>偏好設定 (Settings)</label>
            </div>
            <div class="settings-group">
                <div class="setting-item">
                    <span>出發時間</span>
                    <input type="datetime-local" id="start-time" onchange="calculate()">
                </div>
                <div class="setting-item">
                    <span>能源方案</span>
                    <select id="car-model" onchange="calculate()">
                        <option value="0.160|1.343">EV 住宅 - 非高峰 ($1.343)</option>
                        <option value="0.160|1.773">EV 住宅 - 高峰 ($1.773)</option>
                        <option value="0.160|2.430">Tesla Supercharge ($2.4300)</option>
                    </select>
                </div>
            </div>
        </section>

        <div id="map"></div>

        <section class="stats-grid">
            <div class="stat-card"><span>總里程</span><b id="km">0.0 <small>km</small></b></div>
            <div class="stat-card"><span>總時間</span><b id="duration">0 <small>min</small></b></div>
            <div class="stat-card"><span>隧道費</span><b id="t-fee" style="color: var(--primary);">$0</b></div>
            <div class="stat-card"><span>能源費</span><b id="e-cost">$0</b></div>
        </section>

        <!-- 版本號 -->
        <div style="text-align: center; padding: 20px 0 80px 0; font-size: 10px; color: rgba(255,255,255,0.3);">
            Version 0.40.4
        </div>
    </div>

    <footer class="bottom-nav">
        <div class="nav-content">
            <div class="total-display-group">
                <div class="label-top">Estimated Total</div>
                <div class="main-currency">HK$ <span id="total">0.0</span></div>
            </div>
            <div class="nav-actions">
                <button class="primary-btn" onclick="calculate()">UPDATE</button>
            </div>
        </div>
    </footer>

    <script src="app.js?v=0.40.4"></script>
</body>
</html>
