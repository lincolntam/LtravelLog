<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LTravelLog</title>

<link rel="stylesheet" href="style.css" />
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

</head>

<body>

<div class="map-bg"></div>

<!-- 中間 pin -->
<div class="center-pin">
  <div class="pin-label" id="pin-label">Where you go?</div>
  <div class="pin-icon">
    <span class="material-icons">location_on</span>
  </div>
</div>

<!-- 搜尋卡 -->
<div class="search-card" id="search-card">
  
  <input class="node-input" placeholder="Pickup" oninput="calculate()">
  <input class="node-input" placeholder="Destination" oninput="calculate()">

  <button class="main-btn" onclick="calculate()">Where you go?</button>
</div>

<!-- 結果卡 -->
<div class="result-card" id="result-card">

  <h2>Arriving</h2>

  <div class="route">
    <div id="pickup-text">-</div>
    <div id="dropoff-text">-</div>
  </div>

  <div class="stats">
    <div>KM: <span id="km">0</span></div>
    <div>Time: <span id="duration">0</span></div>
    <div>Tunnel: $<span id="t-fee">0</span></div>
    <div>Energy: $<span id="e-cost">0</span></div>
  </div>

  <div class="total">
    HK$ <span id="total">0</span>
  </div>

  <button class="main-btn" onclick="resetView()">Cancel</button>

</div>

<script src="app.js"></script>
</body>
</html>
