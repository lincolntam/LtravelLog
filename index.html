<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>LTravelLog</title>

  <link rel="manifest" href="manifest.json?v=0.50.0" />
  <link rel="apple-touch-icon" href="icons/icon-192x192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="LTravelLog" />
  <meta name="theme-color" content="#f4f5f4" />

  <link rel="stylesheet" href="style.css?v=0.50.0" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
</head>

<body>
  <main class="phone-shell">
    <section class="map-stage">
      <div id="map"></div>
      <div class="map-fallback"></div>

      <header class="top-bar">
        <button class="icon-btn" type="button" aria-label="menu">
          <span class="material-icons">menu</span>
        </button>
        <div class="top-title" id="screen-title">LTravelLog</div>
        <button class="icon-btn" type="button" onclick="logout()" aria-label="logout">
          <span class="material-icons">logout</span>
        </button>
      </header>

      <div class="floating-pin" id="floating-pin">
        <div class="pin-label" id="pin-label">Where are you going?</div>
        <div class="pin-circle">
          <span class="material-icons">location_on</span>
        </div>
      </div>

      <section class="search-card" id="search-card">
        <div id="nodes-container" class="nodes-container">
          <div class="input-line">
            <span class="dot start"></span>
            <input class="node-input" placeholder="Pickup point" autocomplete="off" oninput="calculate()" />
          </div>
          <div class="input-line">
            <span class="dot end"></span>
            <input class="node-input" placeholder="Where you go?" autocomplete="off" oninput="calculate()" />
          </div>
        </div>

        <div class="quick-actions">
          <button class="ghost-btn" type="button" onclick="addNode()">
            <span class="material-icons">add</span>
            Stop
          </button>
          <button class="ghost-btn" id="retBtn" type="button" onclick="toggleReturn()">
            <span class="material-icons">repeat</span>
            Return
          </button>
        </div>

        <button class="primary-btn full" type="button" onclick="calculate()">Where you go?</button>
      </section>

      <section class="trip-card" id="trip-card">
        <div class="arrival-status">
          <div>
            <h1>Arriving</h1>
            <p id="arrival-text">Your route is ready</p>
          </div>
          <button class="collapse-btn" type="button" onclick="resetTripView()">
            <span class="material-icons">expand_more</span>
          </button>
        </div>

        <div class="driver-card">
          <div class="car-badge">
            <span class="material-icons">electric_car</span>
          </div>
          <div>
            <h2>LTravelLog Trip</h2>
            <p id="route-summary">Hong Kong EV route estimate</p>
          </div>
        </div>

        <div class="card-actions">
          <button type="button" onclick="calculate()">
            <span class="material-icons">refresh</span>
            Update
          </button>
          <button type="button" onclick="shareTrip()">
            <span class="material-icons">ios_share</span>
            Share
          </button>
        </div>

        <div class="route-points">
          <div class="route-row">
            <span class="route-dot pickup"></span>
            <div>
              <small>Pickup point</small>
              <p id="pickup-text">-</p>
            </div>
          </div>
          <div class="route-line"></div>
          <div class="route-row">
            <span class="route-dot dropoff"></span>
            <div>
              <small>Dropoff point</small>
              <p id="dropoff-text">-</p>
            </div>
          </div>
        </div>

        <div class="settings-panel">
          <label>
            <span>Start</span>
            <input type="datetime-local" id="start-time" onchange="calculate()" />
          </label>

          <label class="return-only">
            <span>Return</span>
            <input type="datetime-local" id="return-time" onchange="calculate()" />
          </label>

          <label>
            <span>Energy</span>
            <select id="car-model" onchange="calculate()">
              <option value="0.160|1.343">EV Home Off Peak</option>
              <option value="0.160|1.773">EV Home Peak</option>
              <option value="0.160|2.430">Tesla Supercharge</option>
            </select>
          </label>
        </div>

        <div class="tunnel-section conditional-show" id="go-card">
          <div class="mini-title">Go tunnel</div>
          <div class="tunnel-grid" id="goTunnels"></div>
        </div>

        <div class="tunnel-section conditional-show" id="back-card">
          <div class="mini-title">Return tunnel</div>
          <div class="tunnel-grid" id="backTunnels"></div>
        </div>

        <div class="payment-grid">
          <div>
            <small>Distance</small>
            <strong id="km">0.0 <em>km</em></strong>
          </div>
          <div>
            <small>Duration</small>
            <strong id="duration">0 <em>min</em></strong>
          </div>
          <div>
            <small>Tunnel</small>
            <strong id="t-fee">$0</strong>
          </div>
          <div>
            <small>Energy</small>
            <strong id="e-cost">$0</strong>
          </div>
        </div>

        <div class="total-row">
          <span>Amount</span>
          <strong>HK$ <span id="total">0.0</span></strong>
        </div>

        <button class="primary-btn full cancel-style" type="button" onclick="resetTripView()">Cancel</button>
      </section>
    </section>
  </main>

  <script src="app.js?v=0.50.0"></script>
</body>
</html>
