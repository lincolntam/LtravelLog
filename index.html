<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LTravelLog</title>
    <!-- PWA 配置 -->
    <link rel="manifest" href="manifest.json?v=0.40.4">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png?v=0.40.4">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LTravelLog">
    
    <link rel="stylesheet" href="style.css?v=0.40.4">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

    <!-- Google Maps 容器 -->
    <div id="map"></div>

    <div class="app-shell">
        <!-- 步驟 1: 初始狀態 (左側 UI) -->
        <div id="step-1" class="ui-step">
            <div class="glass-sheet">
                <div class="recent-trips">
                    <p style="color:#64748b; font-size:12px; margin-bottom:12px; font-weight:600;">RECENT TRIPS</p>
                    <div class="trip-item">
                        <span class="material-icons" style="font-size:18px;">history</span> 
                        <span>Central to Mong Kok</span>
                    </div>
                </div>
                <button class="step-btn-primary" onclick="goToStep(2)">Where you go?</button>
            </div>
        </div>

        <!-- 步驟 2: 偏好設定 (中間 UI) -->
        <div id="step-2" class="ui-step">
            <div class="glass-sheet">
                <div class="sheet-handle" onclick="goToStep(1)"></div>
                <section class="card">
                    <div id="nodes-container">
                        <input class="node-input" placeholder="From?" oninput="calculate()">
                        <input class="node-input" placeholder="To?" oninput="calculate()">
                    </div>
                </section>
                <section class="card">
                    <select id="car-model" class="modern-select" onchange="calculate()">
                        <option value="0.160|1.343">EV 住宅 - 非高峰 ($1.343)</option>
                        <option value="0.160|1.773">EV 住宅 - 高峰 ($1.773)</option>
                        <option value="0.160|2.430">Tesla Supercharge ($2.430)</option>
                    </select>
                </section>
                <button class="step-btn-primary" onclick="goToStep(3)">Lets Go</button>
            </div>
        </div>

        <!-- 步驟 3: 行程總結 (右側 UI) -->
        <div id="step-3" class="ui-step">
            <div class="glass-sheet">
                <div style="text-align:center; margin-bottom:20px;">
                    <h3 style="margin:0; font-size:22px; color:#1e293b;">Arriving</h3>
                    <p style="margin:5px 0 0; color:#10B981; font-weight:600;">Calculation Ready</p>
                </div>
                
                <div class="stats-row">
                    <div class="stat-box"><span>Dist</span><b id="km">0.0</b></div>
                    <div class="stat-box"><span>Time</span><b id="duration">0</b></div>
                    <div class="stat-box"><span>Tunnels</span><b id="t-fee">$0</b></div>
                </div>
                
                <div class="total-bar">
                    <span style="font-weight:600; color:#64748b;">Total Cost</span>
                    <span class="price">HK$ <span id="total">0.0</span></span>
                </div>
                
                <button class="cancel-btn" onclick="goToStep(1)">Cancel</button>
            </div>
        </div>
    </div>

    <!-- 替換為你的 Google Maps API Key -->
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap" async defer></script>
    <script src="app.js?v=0.40.4"></script>
</body>
</html>
