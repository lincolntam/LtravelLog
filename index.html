<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LTravelLog</title>
    
    <link rel="manifest" href="manifest.json?v=0.40.4">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="stylesheet" href="style.css?v=0.40.4">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- 腳本加載順序：先讀取配置，再執行應用邏輯 -->
    <script src="config.js"></script>
</head>
<body>

    <div id="map"></div>

    <!-- Image 1: 頂部位置氣泡 -->
    <div id="top-bubble" class="active">
        <div class="bubble-inner">
            <span class="pulse-dot"></span>
            <div class="bubble-text">
                <small>Current Location</small>
                <strong>Hong Kong, Central</strong>
            </div>
        </div>
    </div>

    <div class="app-shell">
        <!-- Step 1: 初始搜尋面板 (對應 image_10efba.png) -->
        <div id="step-1" class="ui-step active">
            <div class="bottom-sheet main-sheet">
                <div class="recent-trips">
                    <p class="label">Recent Trips</p>
                    <div class="trip-item"><i class="material-icons green">place</i> Beza Building</div>
                    <div class="trip-item"><i class="material-icons green">place</i> Akangkha Tower</div>
                </div>
                <button class="btn-green-lg" onclick="goToStep(2)">Where you go?</button>
                <button class="btn-logout-small" onclick="logout()">Logout</button>
            </div>
        </div>

        <!-- Step 2: 行程詳情 (對應 image_10ef9e.png) -->
        <div id="step-2" class="ui-step">
            <div class="bottom-sheet full-height-sheet">
                <div class="nav-header">
                    <i class="material-icons" onclick="goToStep(1)">chevron_left</i>
                    <span>Arriving</span>
                </div>

                <div class="route-input-container">
                    <div class="input-row">
                        <i class="material-icons start-icon">radio_button_checked</i>
                        <input type="text" id="origin" placeholder="Pickup point" value="Current Location">
                    </div>
                    <div class="connector-line"></div>
                    <div class="input-row">
                        <i class="material-icons end-icon">location_on</i>
                        <input type="text" id="destination" placeholder="Destination" oninput="calculate()">
                    </div>
                </div>

                <div class="plan-selector">
                    <label>Select Energy Plan</label>
                    <select id="car-model" class="custom-select" onchange="calculate()">
                        <option value="0.160|1.343">EV 住宅 - 非高峰 ($1.343)</option>
                        <option value="0.160|1.773">EV 住宅 - 高峰 ($1.773)</option>
                        <option value="0.160|2.430">Tesla Supercharge ($2.430)</option>
                    </select>
                </div>

                <div class="summary-stats">
                    <div class="stat-item"><span>Distance</span><b id="km">0.0 km</b></div>
                    <div class="stat-item"><span>Total Est.</span><b id="total" class="green-price">HK$ 0.0</b></div>
                </div>

                <button class="btn-cancel" onclick="goToStep(1)">Cancel</button>
            </div>
        </div>
    </div>

    <script src="app.js?v=0.40.4"></script>
</body>
</html>
