<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LTravelLog</title>

    <link rel="manifest" href="manifest.json?v=0.43.0">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LTravelLog">
    <meta name="theme-color" content="#f4f4f2">

    <link rel="stylesheet" href="style.css?v=0.43.0">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <main class="phone-shell" data-view="search">
        <div id="map" aria-label="Map"></div>
        <div class="map-fade"></div>

        <header class="top-bar">
            <button class="icon-btn" id="back-btn" type="button" aria-label="Back">
                <span class="material-icons">chevron_left</span>
            </button>
            <button class="icon-btn" id="menu-btn" type="button" aria-label="Menu">
                <span class="material-icons">menu</span>
            </button>
            <div class="screen-title">LTravelLog</div>
            <button class="icon-btn" id="logout-btn" type="button" aria-label="Logout">
                <span class="material-icons">logout</span>
            </button>
        </header>

        <section class="map-callout" aria-live="polite">
            <span id="callout-destination">Where to?</span>
            <small id="callout-subtitle">Select your route</small>
        </section>

        <div class="map-pin">
            <span class="material-icons">location_on</span>
        </div>

        <button class="locate-btn" type="button" aria-label="Center map">
            <span class="material-icons">my_location</span>
        </button>

        <section class="bottom-sheet search-sheet" aria-label="Plan trip">
            <div class="sheet-handle"></div>
            <div class="recent-block">
                <div class="eyebrow">Recent trip</div>
                <button class="recent-row" type="button" data-origin="Beza Building" data-destination="Akangsha Tower">
                    <span class="dot"></span>
                    <span>
                        <strong>Beza Building</strong>
                        <small>Commercial road, oadis 4526</small>
                    </span>
                </button>
                <button class="recent-row" type="button" data-origin="Akangsha Tower" data-destination="Beza Building">
                    <span class="dot"></span>
                    <span>
                        <strong>Akangsha Tower</strong>
                        <small>Commercial road, beside hospital 5896</small>
                    </span>
                </button>
            </div>

            <div class="route-inputs">
                <label>
                    <span>Pick up</span>
                    <input class="node-input" id="origin-input" placeholder="Current location or address" autocomplete="off">
                </label>
                <label>
                    <span>Destination</span>
                    <input class="node-input" id="destination-input" placeholder="Where you go?" autocomplete="off">
                </label>
            </div>

            <div class="compact-settings">
                <label>
                    <span>Depart</span>
                    <input type="datetime-local" id="start-time">
                </label>
                <label>
                    <span>Energy</span>
                    <select id="car-model">
                        <option value="0.160|1.343">EV Home Off-peak</option>
                        <option value="0.160|1.773">EV Home Peak</option>
                        <option value="0.160|2.430">Tesla Supercharge</option>
                    </select>
                </label>
            </div>

            <button class="primary-btn" id="plan-btn" type="button">Where you go?</button>
            <div class="version-mark">v0.43.0</div>
        </section>

        <section class="bottom-sheet trip-sheet" aria-label="Trip summary">
            <div class="sheet-head">
                <div>
                    <div class="screen-kicker">Arriving</div>
                    <h1 id="arrival-title">Calculating route</h1>
                </div>
                <button class="icon-btn" id="collapse-trip-btn" type="button" aria-label="Edit trip">
                    <span class="material-icons">expand_more</span>
                </button>
            </div>

            <div class="driver-card">
                <div class="driver-avatar">
                    <span class="material-icons">directions_car</span>
                </div>
                <div>
                    <strong>LTravelLog</strong>
                    <small id="route-name">Route planner</small>
                </div>
            </div>

            <div class="action-pair">
                <button type="button"><span class="material-icons">call</span> Call Now</button>
                <button type="button"><span class="material-icons">chat_bubble_outline</span> Message</button>
            </div>

            <div class="trip-points">
                <div class="point-row">
                    <span class="dot"></span>
                    <div>
                        <small>Pick up point</small>
                        <strong id="summary-origin">-</strong>
                    </div>
                </div>
                <div class="point-row">
                    <span class="dot"></span>
                    <div>
                        <small>Destination</small>
                        <strong id="summary-destination">-</strong>
                    </div>
                </div>
            </div>

            <div class="metrics-grid">
                <div><small>Distance</small><strong id="km">0.0 km</strong></div>
                <div><small>Time</small><strong id="duration">0 min</strong></div>
                <div><small>Tunnel</small><strong id="t-fee">$0</strong></div>
                <div><small>Energy</small><strong id="e-cost">$0.0</strong></div>
            </div>

            <div class="payment-row">
                <span>Payment</span>
                <strong>Cash</strong>
                <span>Amount</span>
                <strong><span id="total">0.0</span> HKD</strong>
            </div>

            <details class="tunnel-options">
                <summary>Route options</summary>
                <div class="option-label">Outbound tunnels</div>
                <div class="tunnel-grid" id="goTunnels"></div>
            </details>

            <button class="primary-btn cancel-btn" id="cancel-btn" type="button">Cancel</button>
        </section>
    </main>

    <script src="app.js?v=0.43.0"></script>
</body>
</html>
