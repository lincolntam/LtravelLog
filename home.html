<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <title>LTravelLog - Home</title>
  <meta name="description" content="LTravelLog - Tesla Smart Route Planner (Hong Kong)" />

  <!-- PWA Manifest (cache busting) -->
  <link rel="manifest" href="./manifest.json?v=0.55.0">

  <!-- Theme -->
  <meta name="theme-color" content="#0b0f17" />

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LTravelLog" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png">

  <!-- Icons -->
  <link rel="icon" href="./favicon.ico" />

  <!-- Home Styles (cache busting) -->
  <link rel="stylesheet" href="./home-style.css?v=0.55.0" />

  <!-- Preload background image for smoother first paint -->
  <link rel="preload" as="image" href="./banner.jpg" />
</head>

<body class="home-page">
  <div id="app" class="app-shell">

    <!-- Header -->
    <header class="home-header">
      <h1 class="home-title">
        Hello, lincolntam.<br />
        What will you choose today?
      </h1>

      <div class="quick-row" aria-label="Quick actions">
        <button class="quick-btn glass-card" id="btnPlanner" type="button">
          <span class="quick-icon" aria-hidden="true">🧭</span>
          <span class="quick-text">Planner</span>
        </button>

        <button class="quick-btn glass-card" id="btnTunnel" type="button">
          <span class="quick-icon" aria-hidden="true">🧲</span>
          <span class="quick-text">Tunnel</span>
        </button>

        <button class="quick-btn glass-card" id="btnCharging" type="button">
          <span class="quick-icon" aria-hidden="true">⚡</span>
          <span class="quick-text">Charging</span>
        </button>
      </div>
    </header>

    <!-- Main -->
    <main class="home-main" role="main">
      <h2 class="section-title">Recommended Tools</h2>

      <!-- Featured -->
      <article class="feature-card glass-card" id="cardTripPlanner" role="button" tabindex="0" aria-label="Trip Cost Planner">
        <div class="feature-left">
          <div class="feature-badge">Live route</div>
          <div class="feature-title">Trip Cost Planner</div>
          <div class="feature-subtitle">Distance, tunnel fee and EV cost in one route.</div>
        </div>
        <div class="feature-right" aria-hidden="true">
          <div class="feature-dot"></div>
        </div>
      </article>

      <!-- Info Cards -->
      <article class="info-card glass-card" id="cardTunnelFee" role="button" tabindex="0" aria-label="Tunnel fee">
        <div class="info-left">
          <div class="info-icon" aria-hidden="true">🧾</div>
          <div class="info-text">
            <div class="info-label">Information</div>
            <div class="info-title">Tunnel fee</div>
            <div class="info-subtitle">Time-varying toll and fixed tunnel charges.</div>
          </div>
        </div>
        <div class="info-arrow" aria-hidden="true">›</div>
      </article>

      <article class="info-card glass-card" id="cardChargingFee" role="button" tabindex="0" aria-label="Charging fee">
        <div class="info-left">
          <div class="info-icon" aria-hidden="true">🔋</div>
          <div class="info-text">
            <div class="info-label">Information</div>
            <div class="info-title">Charging fee</div>
            <div class="info-subtitle">Charging cost assumptions used by planner.</div>
          </div>
        </div>
        <div class="info-arrow" aria-hidden="true">›</div>
      </article>

      <div class="version" id="versionText">v0.55.0</div>
    </main>

    <!-- Bottom Nav -->
    <nav class="bottom-nav glass-card" aria-label="Bottom navigation">
      <button class="nav-item active" id="navHome" type="button" aria-label="Home">
        <span class="nav-icon" aria-hidden="true">⌂</span>
        <span class="nav-text">Home</span>
      </button>

      <button class="nav-item" id="navExplore" type="button" aria-label="Explore">
        <span class="nav-icon" aria-hidden="true">🧭</span>
        <span class="nav-text">Explore</span>
      </button>

      <button class="nav-item" id="navInfo" type="button" aria-label="Info">
        <span class="nav-icon" aria-hidden="true">👤</span>
        <span class="nav-text">Info</span>
      </button>
    </nav>
  </div>

  <!-- App logic (cache busting) -->
  <script src="./app.js?v=0.55.0"></script>

  <!-- Minimal navigation wiring (won't break if app.js already handles it) -->
  <script>
    (function () {
      // 如果你 app.js 已有 routing，呢段只會作後備，不會覆蓋你原本邏輯
      const go = (url) => { try { window.location.href = url; } catch (e) {} };

      const btnPlanner = document.getElementById("btnPlanner");
      const btnTunnel = document.getElementById("btnTunnel");
      const btnCharging = document.getElementById("btnCharging");
      const cardTripPlanner = document.getElementById("cardTripPlanner");
      const cardTunnelFee = document.getElementById("cardTunnelFee");
      const cardChargingFee = document.getElementById("cardChargingFee");

      // 你可以按你實際頁面名稱改路徑，例如 planner.html / tunnel.html / charging.html
      const plannerUrl = "./index.html";     // 例：主 Planner 頁
      const tunnelUrl  = "./index.html#tunnel";
      const chargeUrl  = "./index.html#charging";

      if (btnPlanner) btnPlanner.addEventListener("click", () => go(plannerUrl));
      if (cardTripPlanner) cardTripPlanner.addEventListener("click", () => go(plannerUrl));

      if (btnTunnel) btnTunnel.addEventListener("click", () => go(tunnelUrl));
      if (cardTunnelFee) cardTunnelFee.addEventListener("click", () => go(tunnelUrl));

      if (btnCharging) btnCharging.addEventListener("click", () => go(chargeUrl));
      if (cardChargingFee) cardChargingFee.addEventListener("click", () => go(chargeUrl));
    })();
  </script>
</body>
</html>
