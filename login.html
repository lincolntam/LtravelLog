<!-- 註冊區塊 (初始隱藏) -->
<div id="signup-section" style="display: none;">
    <div class="glass-card">
        <div class="top-nav">
            <span class="brand">LTravelLog</span>
            <a href="#" onclick="toggleSection('login')" class="signup">Back to Log in</a>
        </div>
        <h2>Sign up</h2>
        <form id="signup-form">
            <input type="email" id="up-email" class="node-input" placeholder="e-mail address" required>
            <input type="password" id="up-password" class="node-input" placeholder="password" required>
            <input type="text" id="invitation-code" class="node-input" placeholder="invitation code" required>
            
            <div class="form-footer">
                <p>Verify code to join.</p>
                <button type="submit" class="arrow-btn">
                    <span class="material-icons">how_to_reg</span>
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    // 切換登入與註冊介面
    function toggleSection(type) {
        const loginSec = document.getElementById('login-section');
        const signupSec = document.getElementById('signup-section');
        if (type === 'signup') {
            loginSec.style.display = 'none';
            signupSec.style.display = 'block';
        } else {
            loginSec.style.display = 'block';
            signupSec.style.display = 'none';
        }
    }

    // 註冊邏輯
    document.getElementById('signup-form').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('up-email').value;
        const password = document.getElementById('up-password').value;
        const code = document.getElementById('invitation-code').value;

        const response = await fetch('/api/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password, code })
        });

        const result = await response.json();
        if (response.ok) {
            alert("Account created! Please log in.");
            toggleSection('login');
        } else {
            alert(result.error || "Signup failed");
        }
    };
</script>
