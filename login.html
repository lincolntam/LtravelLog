<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Login - LTravelLog</title>
    <meta name="theme-color" content="#02050a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json?v=0.55.14">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link rel="stylesheet" href="login-style.css?v=0.55.14">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; min-height: 100dvh; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="login-page">
        <div id="login-section" class="glass-card">
            <div class="top-nav">
                <span class="brand">LTravelLog</span>
                <a href="#" onclick="toggleSection('signup')" class="signup">Sign up</a>
            </div>
            <h2>Log in</h2>
            <form id="login-form">
                <div class="input-field"><input type="email" id="login-email" placeholder="e-mail address" required></div>
                <div class="input-field"><input type="password" id="login-password" placeholder="password" required></div>
                <div class="form-footer">
                    <p>Enter your credentials.</p>
                    <button type="submit" class="arrow-btn"><span class="material-icons">arrow_forward</span></button>
                </div>
            </form>
        </div>

        <div id="signup-section" class="glass-card hidden">
            <div class="top-nav">
                <span class="brand">LTravelLog</span>
                <a href="#" onclick="toggleSection('login')" class="signup">Back to Log in</a>
            </div>
            <h2>Sign up</h2>
            <form id="signup-form">
                <div class="input-field"><input type="text" id="up-username" placeholder="username" minlength="2" maxlength="40" required></div>
                <div class="input-field"><input type="email" id="up-email" placeholder="e-mail address" required></div>
                <div class="input-field"><input type="password" id="up-password" placeholder="create password" minlength="8" required></div>
                <div class="input-field"><input type="text" id="invitation-code" placeholder="invitation code" required></div>
                <div class="form-footer">
                    <p>Verify code to join.</p>
                    <button type="submit" class="arrow-btn"><span class="material-icons">how_to_reg</span></button>
                </div>
            </form>
        </div>

        <div style="position: fixed; bottom: 15px; width: 100%; text-align: center; font-size: 10px; color: rgba(0,0,0,0.2);">
            v0.55.14
        </div>
    </div>

    <script>
        function toggleSection(type) {
            document.getElementById('login-section').classList.toggle('hidden', type === 'signup');
            document.getElementById('signup-section').classList.toggle('hidden', type === 'login');
        }

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            if (res.ok) {
                window.location.href = 'home.html';
            } else {
                const data = await res.json().catch(() => ({}));
                alert(data.error || 'Login failed');
            }
        };

        document.getElementById('signup-form').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('up-username').value.trim();
            const email = document.getElementById('up-email').value.trim();
            const password = document.getElementById('up-password').value;
            const code = document.getElementById('invitation-code').value.trim();
            const res = await fetch('/api/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password, code })
            });
            if (res.ok) {
                alert('Signup successful');
                toggleSection('login');
            } else {
                const data = await res.json().catch(() => ({}));
                alert(data.error || 'Signup failed');
            }
        };
    </script>
</body>
</html>
