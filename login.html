<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LTravelLog</title>
    <link rel="stylesheet" href="login-style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

<div class="background-decor">
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
</div>

<div class="login-page">
    <div class="glass-card main-login">
        <div class="top-nav">
            <span class="brand">LTravelLog</span>
            <a href="#" class="signup">Sign up</a>
        </div>
        
        <h2>Log in</h2>
        
        <form id="login-form">
            <div class="input-field">
                <input type="text" id="email" placeholder="e-mail address" required>
            </div>
            <div class="input-field">
                <input type="password" id="password" placeholder="password" required>
            </div>
            
            <div class="form-footer">
                <p>Please consume responsibly.</p>
                <button type="submit" class="arrow-btn">
                    <span class="material-icons">arrow_forward</span>
                </button>
            </div>
        </form>
    </div>

    <!-- 圖片中的黑色小卡片 -->
    <div class="dark-card info-card">
        <h3>New in</h3>
        <p>LTravelLog Designer</p>
    </div>
</div>

<script>
    document.getElementById('login-form').onsubmit = (e) => {
        e.preventDefault();
        const val = document.getElementById('email').value.trim();
        // 保留之前的測試金鑰邏輯
        if (val === 'Sa302306') {
            localStorage.setItem('isLoggedIn', 'true');
            window.location.href = 'index.html';
        } else {
            alert("請輸入正確的測試資訊。");
        }
    };
</script>
</body>
</html>
