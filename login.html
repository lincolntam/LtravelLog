<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - LTravelLog</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    
    <link rel="stylesheet" href="login-style.css?v=0.42.0">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { background: #e9e2d7; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="login-page">
        <!-- 登入區塊 -->
        <div id="login-section" class="glass-card">
            <div class="top-nav">
                <span class="brand">LTravelLog</span>
                <a href="#" onclick="toggleSection('signup')" class="signup">Sign up</a>
            </div>
            <h2>Log in</h2>
            <form id="login-form">
                <div class="input-field"><input type="email" id="login-email" placeholder="e-mail address" required></div>
                <div class="input-field"><input type="password" id="login-password" placeholder="password" required></div>
                <div class="form-footer">
                    <p>Enter your credentials.</p>
                    <button type="submit" class="arrow-btn"><span class="material-icons">arrow_forward</span></button>
                </div>
            </form>
        </div>

        <!-- 註冊區塊 -->
        <div id="signup-section" class="glass-card hidden">
            <div class="top-nav">
                <span class="brand">LTravelLog</span>
                <a href="#" onclick="toggleSection('login')" class="signup">Back to Log in</a>
            </div>
            <h2>Sign up</h2>
            <form id="signup-form">
                <div class="input-field"><input type="text" id="up-username" placeholder="username" minlength="2" maxlength="40" required></div>
                <div class="input-field"><input type="email" id="up-email" placeholder="e-mail address" required></div>
                <div class="input-field"><input type="password" id="up-password" placeholder="create password" required></div>
                <div class="input-field"><input type="text" id="invitation-code" placeholder="invitation code" required></div>
                <div class="form-footer">
                    <p>Verify code to join.</p>
                    <button type="submit" class="arrow-btn"><span class="material-icons">how_to_reg</span></button>
                </div>
            </form>
        </div>

        <!-- 版本號 (移除黑盒子後放在底部) -->
        <div style="position: fixed; bottom: 15px; width: 100%; text-align: center; font-size: 10px; color: rgba(0,0,0,0.2);">
            v0.42.0
        </div>
    </div>

    <script>
        function toggleSection(type) {
            document.getElementById('login-section').classList.toggle('hidden', type === 'signup');
            document.getElementById('signup-section').classList.toggle('hidden', type === 'login');
        }

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            if (res.ok) {
                window.location.href = 'index.html';
            } else { alert("登入失敗"); }
        };

        document.getElementById('signup-form').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('up-username').value;
            const email = document.getElementById('up-email').value;
            const password = document.getElementById('up-password').value;
            const code = document.getElementById('invitation-code').value;
            const res = await fetch('/api/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password, code })
            });
            if (res.ok) { alert("註冊成功！"); toggleSection('login'); } else { alert("註冊失敗"); }
        };
    </script>
</body>
</html>
